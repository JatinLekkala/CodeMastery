<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background Shield or Terminal Shell -->
  <rect x="2" y="2" width="20" height="20" rx="4" fill="none" stroke="url(#grad)" stroke-width="2" />
  <!-- Left angle bracket < -->
  <path d="M8 8l-4 4 4 4" fill="none" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Right angle bracket > -->
  <path d="M16 8l4 4-4 4" fill="none" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Slash / -->
  <path d="M13.5 7l-3 10" fill="none" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round" />
